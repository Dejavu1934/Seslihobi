<!DOCTYPE html>
<html>
<head>
    <title>Pangi - Canlı Sesli Sohbet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; margin: 0; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .rooms { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .room { background: #e91e63; padding: 15px; border-radius: 10px; cursor: pointer; flex: 1; text-align: center; }
        .chat { height: 400px; background: #2a2a2a; border-radius: 10px; overflow-y: auto; padding: 10px; }
        .msg { margin: 5px 0; }
        .bot { color: #4caf50; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { background: #e91e63; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #mic { background: #f44336; }
        #mic.active { background: #4caf50; }
        .users { background: #2a2a2a; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Pangi Canlı Sohbet</h1>
        <div class="rooms">
            <div class="room" onclick="joinRoom('Genel Sohbet')">Genel Sohbet</div>
            <div class="room" onclick="joinRoom('Oyun')">Oyun</div>
            <div class="room" onclick="joinRoom('Müzik')">Müzik</div>
            <div class="room" onclick="joinRoom('Gece Kuşları')">Gece Kuşları</div>
        </div>
        <div class="users" id="users">Odaya gir...</div>
        <div class="chat" id="chat"></div>
        <div class="controls">
            <input id="msg" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">Gönder</button>
            <button id="mic" onclick="toggleMic()">🎤 Mikrofon</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = "";
        let micOn = false;
        let localStream;

        function joinRoom(room) {
            currentRoom = room;
            socket.emit('joinRoom', room);
            document.getElementById('chat').innerHTML = `<div class="msg">** ${room} odasına girdin **</div>`;
        }

        socket.on('roomUsers', (users) => {
            document.getElementById('users').innerHTML = `Odada ${users.length} kişi: ` + users.map(u => u.name).join(', ');
        });

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg ${data.isBot ? 'bot' : ''}"><b>${data.user}:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        function sendMsg() {
            const msg = document.getElementById('msg').value;
            if(msg && currentRoom) {
                socket.emit('message', { room: currentRoom, text: msg, user: "Sen" });
                document.getElementById('msg').value = "";
            }
        }

        async function toggleMic() {
            const btn = document.getElementById('mic');
            if(!micOn) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micOn = true;
                btn.classList.add('active');
                btn.innerText = "🔴 Canlı";
            } else {
                localStream.getTracks().forEach(track => track.stop());
                micOn = false;
                btn.classList.remove('active');
                btn.innerText = "🎤 Mikrofon";
            }
        }

        joinRoom('Genel Sohbet');
    </script>
</body>
</html>
